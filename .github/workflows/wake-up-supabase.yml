name: Wake Up Supabase

on:
  schedule:
    - cron: "0 6 * * *"   # Runs once per day at 06:00 UTC
  workflow_dispatch:       # Allows manual runs from the Actions tab

jobs:
  ping-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Validate SUPABASE_PROJECTS_JSON secret exists
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECTS_JSON }}" ]; then
            echo "❌ Secret SUPABASE_PROJECTS_JSON is not set."
            echo "Go to Settings → Secrets and variables → Actions and add it."
            exit 1
          fi

      - name: Insert a heartbeat row into each Supabase project
        env:
          SUPABASE_PROJECTS_JSON: ${{ secrets.SUPABASE_PROJECTS_JSON }}
        run: |
          # Install jq for JSON parsing
          sudo apt-get update -y > /dev/null
          sudo apt-get install -y jq > /dev/null

          LENGTH=$(echo "$SUPABASE_PROJECTS_JSON" | jq '. | length')
          echo "📦 Found $LENGTH Supabase project(s)."

          if [ "$LENGTH" -eq 0 ]; then
            echo "⚠️ No projects defined in SUPABASE_PROJECTS_JSON."
            exit 0
          fi

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "🕒 Heartbeat value: $NOW"

          for i in $(seq 0 $((LENGTH - 1))); do
            URL=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].url")
            KEY=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].anon_key")
            TABLE=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].table")

            if [ -z "$URL" ] || [ "$URL" = "null" ]; then
              echo "⚠️ Skipping project at index $i — missing url."
              continue
            fi

            if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
              echo "⚠️ Skipping $URL — missing anon_key."
              continue
            fi

            # table is optional; default to wake_up_supabase
            if [ -z "$TABLE" ] || [ "$TABLE" = "null" ]; then
              TABLE="wake_up_supabase"
            fi

            # POST a row to the PostgREST data API. An INSERT is an unambiguous
            # DB write — it bypasses any read cache and is exactly the kind of
            # activity Supabase's 7-day inactivity timer tracks.
            INSERT_URL="${URL%/}/rest/v1/${TABLE}"
            BODY=$(jq -n --arg v "$NOW" '{value: $v}')
            echo "🌐 Inserting heartbeat into: ${URL%/}/rest/v1/${TABLE}"

            # Allow curl to fail without killing the whole job
            set +e
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "apikey: $KEY" \
              -H "Authorization: Bearer $KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              --data "$BODY" \
              "$INSERT_URL")
            CURL_EXIT=$?
            set -e

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "❌ Curl failed for $URL (exit code $CURL_EXIT). Skipping."
              continue
            fi

            if [ "$HTTP_CODE" = "201" ]; then
              echo "✅ $URL responded with HTTP 201 — row inserted, timer reset."
            elif [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo "⚠️ $URL responded with HTTP $HTTP_CODE — anon role can't insert into \"$TABLE\"."
              echo "   Run the setup SQL from the README in the Supabase SQL Editor to create the table and RLS policy."
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "❌ $URL responded with HTTP $HTTP_CODE — table \"$TABLE\" not found."
              echo "   Run the setup SQL from the README, or check the table name."
            else
              echo "❌ $URL responded with HTTP $HTTP_CODE — check project status, URL, or table."
            fi
          done
